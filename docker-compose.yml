services:

  web:
    build: ./app
    container_name: flask_app

    ports:
      - "5000:5000"

    depends_on:
      - db

  db:
    image: mysql:8
    container_name: mysql_db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: prueba

    ports:
      - "3306:3306"